name: Code Quality

on:
  workflow_call:

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust
        uses: rust-lang/rust-action@v1
        with:
          toolchain: stable

      - name: Cargo Check
        run: cargo check

      - name: Clippy Lint
        run: cargo clippy -- -D warnings

      - name: Format Check
        run: cargo fmt -- --check

      - name: Run Tests
        run: cargo test

      - name: Security Audit
        run: cargo audit || true
